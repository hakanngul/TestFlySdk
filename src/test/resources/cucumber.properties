# Cucumber Test Configuration

cucumber.execution.parallel.enabled=true
cucumber.execution.parallel.config.strategy=fixed
cucumber.execution.parallel.config.fixed.parallelism=4

cucumber.publish.enabled=false
cucumber.publish.quiet=true
cucumber.glue=com.testfly.sdk.tests.web,com.testfly.sdk.tests.api,com.testfly.sdk.bdd.hooks

# Plugins: Both Allure and ExtentReports
cucumber.plugin=io.qameta.allure.cucumber7jvm.AllureCucumber7Jvm,com.aventstack.extentreports.cucumber.adapter.ExtentCucumberAdapter:target/extent-reports

# Allure Configuration
allure.results.directory=target/allure-results

# ExtentReports Configuration
extent.reporter.spark.start=true
extent.reporter.spark.out=target/extent-reports/Spark.html
screenshot.dir=target/screenshots
screenshot.rel.path=../screenshots/
