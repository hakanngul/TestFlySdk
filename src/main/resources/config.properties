# Default Browser Settings
browser=chrome
headless=true
timeout=10000
record.video=false

# Default Environment (Usually Dev or Stage is preferred locally)
environment=local
base.url=https://localhost:8080

# Log Level
log.level=INFO

# API Settings
api.timeout.connect=30000
api.timeout.read=30000
api.retry.max=3
api.retry.delay=1000